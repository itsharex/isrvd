server:
  debug: false
  listenAddr: :8080
  jwtSecret: default-secret-key
  # proxyHeaderName: X-Username
  rootDirectory: /srv/

oidc:
  enabled: false
  # issuerUrl: https://idp.example.com
  # 元数据（authorization_endpoint、token_endpoint、jwks_uri 等）由 issuerUrl 自动发现
  # clientId: isrvd
  # clientSecret: your-client-secret
  # redirectUrl: https://isrvd.example.com/api/account/oidc/callback（留空则从请求 Host 自动生成）
  # usernameClaim: preferred_username（默认值，对应 OIDC 标准 claim）
  # scopes: [openid, profile, email]（默认值，openid 始终被自动包含）

agent:
  # model: your-model
  # baseUrl: https://ai.rehiy.wang/v1
  # apiKey: your-api-key

apisix:
  # adminUrl: http://127.0.0.1:9180
  # adminKey: your-admin-key

docker:
  # host: unix:///var/run/docker.sock
  # host: tcp://127.0.0.1:2375
  containerRoot: container/
  registries:
     # - name: Company Hub
     #   description: 公司内部镜像仓库
     #   url: hub.example.com
     #   username: debug
     #   password: 123

marketplace:
  url: https://apps.rehi.org

links:
- label: 工具箱
  url: https://api.rehi.org
  icon: fas fa-cloud-bolt

members:
  - username: admin
    password: admin
    homeDirectory: .
    founder: true

  - username: user1
    password: password1
    homeDirectory: member/user1/
    # permissions 未配置则所有路由无权限
    # 格式："METHOD /api/path"，如 "GET /api/docker/containers"
    permissions:
      - GET /api/overview/status
      - GET /api/docker/containers
      - GET /api/docker/container/:id
